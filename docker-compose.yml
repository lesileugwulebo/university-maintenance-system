version: '3.8'

services:
  # MySQL Database Container
  db:
    image: mysql:8.0
    container_name: miva_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: miva_maintenance
      MYSQL_USER: miva_user
      MYSQL_PASSWORD: MivaPassword123!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Web Application Container
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miva_web_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_TYPE=mysql
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=miva_user
      - MYSQL_PASSWORD=MivaPassword123!
      - MYSQL_DATABASE=miva_maintenance
      - JWT_SECRET=super-secret-miva-key-12345
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
